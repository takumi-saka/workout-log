<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0c0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>筋トレログ</title>
    <link rel="stylesheet" href="./styles.css?v=9" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Workout Log</p>
          <h1 id="screenTitle">記録</h1>
        </div>
        <button class="icon-button" aria-label="今日の記録をリセット" id="resetButton">↺</button>
      </header>

      <main>
        <section class="screen active" data-screen="record">
          <div class="day-switcher" id="dayGrid"></div>
          <div class="empty-state app-error" id="appError" hidden></div>
          <div id="workoutArea" class="workout-area"></div>
        </section>

        <section class="screen" data-screen="history">
          <div class="section-heading">
            <h2>履歴</h2>
            <span>直近</span>
          </div>
          <div class="timeline">
            <div id="historyList"></div>
          </div>
        </section>

        <section class="screen" data-screen="progress">
          <div class="section-heading">
            <h2>進捗</h2>
            <span>Day別</span>
          </div>
          <div class="day-switcher compact" id="progressDayGrid"></div>
          <div id="progressArea" class="progress-area"></div>
        </section>

        <section class="screen" data-screen="menu">
          <div class="section-heading">
            <h2>メニュー編集</h2>
            <button class="text-button" id="addExercise">種目追加</button>
          </div>
          <div id="menuEditor" class="menu-editor"></div>
          <div class="export-panel">
            <h3>出力</h3>
            <button class="secondary-action" id="downloadCsv">CSVをダウンロード</button>
            <button class="secondary-action" id="copySummary">LLM用サマリーをコピー</button>
            <button class="secondary-action" id="exportJson">バックアップを書き出し</button>
            <button class="secondary-action" id="importJson">バックアップを読み込み</button>
            <input id="importJsonFile" type="file" accept="application/json" hidden />
            <button class="secondary-action danger-action" id="resetData">保存データを初期化</button>
          </div>
        </section>
      </main>

      <nav class="tabbar" aria-label="主要ナビゲーション">
        <button class="tab active" data-target="record"><span>記録</span></button>
        <button class="tab" data-target="history"><span>履歴</span></button>
        <button class="tab" data-target="progress"><span>進捗</span></button>
        <button class="tab" data-target="menu"><span>メニュー</span></button>
      </nav>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <div class="sheet-backdrop" id="sheet" hidden>
        <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
          <div class="sheet-head">
            <h2 id="sheetTitle"></h2>
            <button class="icon-button sheet-close" id="sheetClose" aria-label="閉じる">×</button>
          </div>
          <form id="sheetForm" class="sheet-form"></form>
        </section>
      </div>
    </div>

    <template id="exerciseTemplate">
      <article class="exercise-card">
        <div class="exercise-head">
          <div class="exercise-left">
            <button class="exercise-main">
              <strong class="exercise-name"></strong>
            </button>
            <div class="exercise-actions">
              <button class="tiny-action exclude-toggle">スキップ</button>
              <button class="tiny-action swap-action">代替</button>
            </div>
          </div>
          <div class="exercise-meta">
            <small class="exercise-sub"></small>
            <small class="previous"></small>
          </div>
          <button class="chevron" aria-label="種目を折りたたむ">⌄</button>
        </div>
        <div class="set-list"></div>
        <button class="add-set">+ セット</button>
        <textarea class="memo" rows="2" placeholder="種目メモ"></textarea>
      </article>
    </template>

    <script src="./app.js?v=9"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
